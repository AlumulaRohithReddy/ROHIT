<div
  class="min-h-screen bg-slate-50 dark:bg-slate-900 flex text-slate-900 dark:text-slate-100 transition-colors duration-300">

  <!-- SIDEBAR -->
  <aside
    class="bg-[#111827] dark:bg-black/40 backdrop-blur-xl flex flex-col transition-all duration-300 ease-in-out border-r border-white/5"
    [class.w-72]="isSidebarOpen" [class.w-20]="!isSidebarOpen">

    <!-- Logo Section -->
    <div class="p-8 flex items-center space-x-3">
      <div
        class="w-10 h-10 rounded-xl bg-amber-50/10 flex items-center justify-center transition-transform hover:scale-110">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f3af3d"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z" />
        </svg>
      </div>
      <span class="text-xl font-bold tracking-tight text-white" *ngIf="isSidebarOpen">ShieldDrive</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-4 space-y-1.5">
      <div class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em] mb-4 px-4" *ngIf="isSidebarOpen">Admin
      </div>
      <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="bg-white/10 text-amber-500 shadow-sm"
        class="flex items-center w-full px-4 py-3 rounded-xl transition-all duration-200 group no-underline text-gray-400 hover:text-white hover:bg-white/5 active:scale-[0.98]">
        <span class="material-icons text-[22px] transition-transform group-hover:scale-110"
          [class.mr-4]="isSidebarOpen">{{item.icon}}</span>
        <span class="font-semibold text-sm" *ngIf="isSidebarOpen">{{item.label}}</span>
      </a>
    </nav>

    <!-- Sidebar spacer -->
    <div class="mt-auto"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 flex flex-col overflow-hidden bg-slate-50 dark:bg-slate-900 transition-colors duration-300">

    <!-- HEADER -->
    <header
      class="h-20 bg-white dark:bg-slate-800/50 dark:backdrop-blur-md border-b border-slate-100 dark:border-slate-700/50 px-8 flex items-center justify-between z-10">
      <div class="flex items-center space-x-6">
        <button (click)="toggleSidebar()"
          class="p-2.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-all active:scale-95">
          <span class="material-icons">menu_open</span>
        </button>
        <h2 class="text-xl font-extrabold text-slate-800 dark:text-white tracking-tight">Admin Dashboard</h2>
      </div>

      <div class="flex items-center space-x-5">
        <!-- Theme Toggle -->
        <button (click)="themeService.toggleTheme()"
          class="p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-amber-50 dark:hover:bg-amber-900/20 hover:text-amber-600 dark:hover:text-amber-500 transition-all flex items-center justify-center active:scale-95">
          <span class="material-icons">{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</span>
        </button>

        <div class="flex flex-col items-end">
          <span class="text-sm font-bold text-slate-900 dark:text-white leading-none">{{userName}}</span>
          <span class="text-xs text-amber-500 font-bold uppercase tracking-widest mt-1">Super Admin</span>
        </div>
        <div class="relative group cursor-pointer transition-transform hover:scale-105">
          <div
            class="w-11 h-11 bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 rounded-2xl flex items-center justify-center font-bold text-lg border-2 border-white dark:border-slate-800 shadow-sm overflow-hidden transition-all group-hover:shadow-md">
            {{userName.charAt(0) || 'A'}}
          </div>
          <div
            class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-green-500 border-2 border-white dark:border-slate-800 rounded-full shadow-sm">
          </div>
        </div>

        <!-- Sign Out Button -->
        <button (click)="logout()"
          class="ml-2 p-2.5 rounded-xl text-slate-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 hover:text-rose-500 transition-all flex items-center justify-center active:scale-95 hover:shadow-sm"
          title="Sign Out">
          <span class="material-icons">logout</span>
        </button>
      </div>
    </header>

    <!-- SCROLLABLE AREA -->
    <div class="flex-1 overflow-y-auto p-10 scroll-smooth">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
