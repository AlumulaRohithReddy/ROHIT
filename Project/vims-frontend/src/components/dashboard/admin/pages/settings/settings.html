<section class="space-y-1 animate-in fade-in slide-in-from-bottom-2 duration-500">
    <h2 class="text-2xl font-bold text-slate-800 dark:text-white">System Settings</h2>
    <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Configure global application behavior</p>
</section>

<div
    class="mt-8 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 overflow-hidden animate-in fade-in duration-700 shadow-sm hover:shadow-md transition-shadow">
    <div
        class="p-6 border-b border-slate-50 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/20">
        <div>
            <h3 class="text-base font-bold text-slate-800 dark:text-white">General Configuration</h3>
        </div>
        <button (click)="saveSettings()" [disabled]="loading"
            class="bg-[#f3af3d] hover:bg-[#e67e22] text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center disabled:opacity-50 active:scale-95 shadow-sm hover:shadow-orange-100">
            <span class="material-icons text-sm mr-2">{{loading ? 'sync' : 'save'}}</span>
            {{loading ? 'Saving...' : 'Save Changes'}}
        </button>
    </div>

    <div class="p-6 space-y-6">
        <div *ngFor="let setting of settings"
            class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-center p-4 rounded-xl transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/40 group">
            <div class="lg:col-span-1">
                <label
                    class="text-sm font-bold text-slate-700 dark:text-slate-200 block mb-1 group-hover:text-orange-500 transition-colors">{{setting.Description}}</label>
                <span
                    class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">{{setting.SettingKey}}</span>
            </div>
            <div class="lg:col-span-2">
                <input type="text" [(ngModel)]="setting.SettingValue" #settingModel="ngModel" required
                    class="w-full px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 text-sm font-medium outline-none focus:border-orange-300 dark:focus:border-orange-700 focus:ring-4 focus:ring-orange-50 dark:focus:ring-orange-900/10 transition-all"
                    [class.border-red-400]="settingModel.invalid && settingModel.touched">
            </div>
        </div>

        <div *ngIf="settings.length === 0 && !loading" class="text-center py-16">
            <div
                class="w-12 h-12 bg-slate-50 dark:bg-slate-900/50 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-slate-100 dark:border-slate-700">
                <span class="material-icons text-3xl text-slate-300">settings_suggest</span>
            </div>
            <p class="text-slate-400 font-bold text-sm">No settings found.</p>
        </div>

        <div *ngIf="loading && settings.length === 0" class="flex justify-center py-16">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#f3af3d]"></div>
        </div>
    </div>
</div>
