<div
    class="min-h-screen bg-gray-50 dark:bg-slate-900 flex font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <!-- SIDEBAR -->
    <aside
        class="bg-[#1a2536] dark:bg-black/40 backdrop-blur-xl text-white flex flex-col transition-all duration-300 ease-in-out border-r border-white/5"
        [class.w-64]="isSidebarOpen" [class.w-20]="!isSidebarOpen">
        <div class="p-6 flex items-center space-x-3 border-b border-white/10">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="#f3af3d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                class="flex-shrink-0">
                <path
                    d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z" />
            </svg>
            <span class="text-xl font-bold tracking-tight whitespace-nowrap" *ngIf="isSidebarOpen">ShieldDrive</span>
        </div>

        <nav class="flex-1 px-3 py-6 space-y-1">
            <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 px-3" *ngIf="isSidebarOpen">
                Claims Officer</div>
            <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="bg-[#f39c12]/10 text-[#f39c12]"
                class="flex items-center px-3 py-3 rounded-xl transition-all duration-200 group hover:bg-white/5 no-underline text-inherit">
                <span class="material-icons" [class.mr-3]="isSidebarOpen">{{item.icon}}</span>
                <span class="font-medium whitespace-nowrap" *ngIf="isSidebarOpen">{{item.label}}</span>
            </a>
        </nav>

        <div class="mt-auto"></div>
    </aside>


    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header
            class="bg-white dark:bg-slate-800/50 dark:backdrop-blur-md border-b border-gray-100 dark:border-slate-700/50 px-8 py-4 flex items-center justify-between shadow-sm z-10 transition-colors duration-300">
            <div class="flex items-center space-x-4">
                <button (click)="toggleSidebar()"
                    class="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-lg text-gray-500 dark:text-slate-400 transition-colors">
                    <span class="material-icons">menu</span>
                </button>
                <h1 class="text-lg font-semibold text-gray-800 dark:text-white">ShieldDrive - Officer Portal</h1>
            </div>
            <div class="flex items-center space-x-5">
                <!-- Theme Toggle -->
                <button (click)="themeService.toggleTheme()"
                    class="p-2.5 rounded-xl bg-gray-50 dark:bg-slate-800 text-gray-500 dark:text-slate-400 hover:bg-orange-50 dark:hover:bg-orange-900/20 hover:text-orange-600 dark:hover:text-orange-500 transition-all flex items-center justify-center">
                    <span class="material-icons">{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode'
                        }}</span>
                </button>

                <div
                    class="w-10 h-10 bg-[#fef5e7] dark:bg-orange-900/30 text-[#f39c12] dark:text-orange-400 rounded-full flex items-center justify-center font-bold border border-orange-100 dark:border-orange-800">
                    O</div>

                <!-- Sign Out Button -->
                <button (click)="logout()"
                    class="p-2.5 rounded-xl text-gray-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 hover:text-rose-500 transition-all flex items-center justify-center"
                    title="Sign Out">
                    <span class="material-icons">logout</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-gray-50 dark:bg-slate-900 transition-colors duration-300">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
