<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-gray-200/50 p-8 border border-gray-100">

        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-[#f39c12]/10 rounded-2xl flex items-center justify-center mb-4">
                <span class="material-icons text-[#f39c12] text-3xl">lock_reset</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Recover Password</h1>
            <p class="text-gray-400 font-medium text-center mt-2 px-6">
                {{ step === 1 ? 'Enter your email to verify your identity' : 'Verify your security question' }}
            </p>
        </div>

        <!-- ERROR MESSAGE -->
        <div *ngIf="errorMessage"
            class="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl flex items-center space-x-3 text-sm font-medium animate-in fade-in slide-in-from-top-1">
            <span class="material-icons text-lg">error_outline</span>
            <span>{{errorMessage}}</span>
        </div>

        <!-- STEP 1: IDENTIFY USER -->
        <form *ngIf="step === 1" #forgotForm1="ngForm" (ngSubmit)="forgotForm1.valid && onGetQuestion()"
            class="space-y-6">
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest pl-1">Email Address</label>
                <div class="relative group">
                    <span
                        class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-[#f39c12] transition-colors">email</span>
                    <input type="email" [(ngModel)]="email" name="email" #emailModel="ngModel" required email
                        placeholder="your@email.com"
                        class="w-full pl-12 pr-4 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-[#f39c12]/5 focus:border-[#f39c12] outline-none transition-all font-medium text-gray-900"
                        [class.border-red-400]="emailModel.invalid && emailModel.touched">
                </div>
                <div *ngIf="emailModel.invalid && emailModel.touched"
                    class="text-red-500 text-[10px] font-bold mt-1 pl-1 uppercase">
                    <span *ngIf="emailModel.errors?.['required']">Email is required</span>
                    <span *ngIf="emailModel.errors?.['email']">Invalid email format</span>
                </div>
            </div>

            <button type="submit" [disabled]="isLoading || forgotForm1.invalid"
                class="w-full bg-[#f39c12] text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-500/20 hover:bg-[#e67e22] hover:-translate-y-0.5 active:translate-y-0 transition-all disabled:opacity-60 disabled:shadow-none disabled:transform-none flex items-center justify-center space-x-2">
                <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span>{{ isLoading ? 'Verifying...' : 'Continue' }}</span>
                <span *ngIf="!isLoading" class="material-icons text-sm">arrow_forward</span>
            </button>
        </form>

        <!-- STEP 2: VERIFY ANSWER & RESET -->
        <form *ngIf="step === 2" #forgotForm2="ngForm" (ngSubmit)="forgotForm2.valid && onResetPassword()"
            class="space-y-6">

            <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100/50 mb-6">
                <p class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-1">Your Security Question</p>
                <p class="text-gray-900 font-bold text-lg leading-snug">{{ securityQuestion }}</p>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest pl-1">Your Answer</label>
                <input type="text" [(ngModel)]="securityAnswer" name="securityAnswer" #ansModel="ngModel" required
                    placeholder="Enter your answer"
                    class="w-full px-4 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-[#f39c12]/5 focus:border-[#f39c12] outline-none transition-all font-medium text-gray-900"
                    [class.border-red-400]="ansModel.invalid && ansModel.touched">
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest pl-1">New Password</label>
                    <input type="password" [(ngModel)]="newPassword" name="newPassword" #passModel="ngModel" required
                        placeholder="••••••••"
                        class="w-full px-4 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-[#f39c12]/5 focus:border-[#f39c12] outline-none transition-all font-medium text-gray-900"
                        [class.border-red-400]="passModel.invalid && passModel.touched">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest pl-1">Confirm
                        Password</label>
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" #confirmModel="ngModel"
                        required placeholder="••••••••"
                        class="w-full px-4 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-[#f39c12]/5 focus:border-[#f39c12] outline-none transition-all font-medium text-gray-900"
                        [class.border-red-400]="(confirmModel.invalid || newPassword !== confirmPassword) && confirmModel.touched">
                    <div *ngIf="newPassword !== confirmPassword && confirmModel.touched"
                        class="text-red-500 text-[10px] font-bold mt-1 pl-1 uppercase">
                        Passwords do not match
                    </div>
                </div>
            </div>

            <button type="submit" [disabled]="isLoading || forgotForm2.invalid || newPassword !== confirmPassword"
                class="w-full bg-[#f39c12] text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-500/20 hover:bg-[#e67e22] hover:-translate-y-0.5 active:translate-y-0 transition-all disabled:opacity-50 disabled:shadow-none disabled:transform-none flex items-center justify-center space-x-2">
                <span>{{ isLoading ? 'Resetting...' : 'Reset Password' }}</span>
                <span *ngIf="!isLoading" class="material-icons text-sm">check_circle</span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-50 text-center">
            <a routerLink="/login"
                class="text-sm font-bold text-[#f39c12] hover:text-[#e67e22] flex items-center justify-center space-x-1">
                <span class="material-icons text-sm">arrow_back</span>
                <span>Back to Login</span>
            </a>
        </div>
    </div>
</div>
